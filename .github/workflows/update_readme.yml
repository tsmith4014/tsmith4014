name: Update README

on:
  schedule:
    # Twice daily UTC; aligns roughly with US Eastern lunch and midnight (varies with DST).
    - cron: "0 17 * * *"
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    env:
      MY_SECRET_KEY: ${{ secrets.MY_SECRET_KEY }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Update README (daily joke)
        run: python ./jokeofday.py
      - name: Update README (daily suggestion)
        run: python ./suggestionoftheday.py
