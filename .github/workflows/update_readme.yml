name: Update README
run-name: Profile signal refresh

on:
  schedule:
    # Twice daily UTC; aligns roughly with US Eastern lunch and midnight (varies with DST).
    - cron: "0 17 * * *"
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-readme-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m unittest -v
      - name: Update README
        run: python ./update_readme.py
      - name: Commit README changes
        run: |
          if git diff --quiet README.md; then
            echo "README already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Refresh README content"
          git push
